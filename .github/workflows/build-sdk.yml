# SDK quick-build — compile multiple packages across multiple device platforms
#
# Prerequisite: run build-v2 once per source+device to publish SDK artifacts.
# Falls back to source-tree package compile when SDK artifact is missing.

name: Build SDK Package

on:
  workflow_dispatch:
    inputs:
      source:
        description: Source tree
        required: true
        default: lede
        type: choice
        options:
          - lede
          - immortalwrt
      devices:
        description: >-
          Device platform. all = every device in configs/devices.list (same codenames as build-v2).
        required: true
        default: all
        type: choice
        options:
          - all
          - phicomm-k2p
          - raspberrypi-4b
          - r2s
          - redmi-ax6000
          - xiaomi-3g
          - xiaomi-ax3600
          - xiaomi-ax6000
          - xiaomi-ax9000
          - xiaomi-cr660x
          - xiaomi-wr30u
          - x86_64
      packages:
        description: Package to build (all = every entry in configs/packages.list)
        required: true
        default: all
        type: choice
        options:
          - all
          - bash
          - bash-completion
          - luci-app-arpbind
          - luci-app-mosdns
          - luci-app-passwall
          - luci-app-passwall2
          - luci-app-turboacc
          - luci-app-ttyd
          - luci-theme-aurora

permissions:
  contents: read

jobs:
  prepare:
    name: Prepare matrix
    runs-on: ubuntu-22.04
    outputs:
      source: ${{ steps.inputs.outputs.source }}
      devices_json: ${{ steps.matrix.outputs.devices_json }}
      packages_json: ${{ steps.matrix.outputs.packages_json }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve inputs
        id: inputs
        shell: bash
        run: |
          echo "source=${{ github.event.inputs.source }}" >> "$GITHUB_OUTPUT"

      - name: Build device and package lists
        id: matrix
        shell: bash
        run: |
          DEVICES_JSON="$(bash scripts/resolve-devices.sh "${{ github.event.inputs.devices }}")"
          PACKAGES_JSON="$(bash scripts/resolve-packages.sh "${{ github.event.inputs.packages }}")"
          echo "devices_json=$DEVICES_JSON" >> "$GITHUB_OUTPUT"
          echo "packages_json=$PACKAGES_JSON" >> "$GITHUB_OUTPUT"
          echo "Devices: $DEVICES_JSON"
          echo "Packages: $PACKAGES_JSON"

  sdk-build:
    name: "${{ matrix.device }} (${{ needs.prepare.outputs.source }})"
    needs: prepare
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        device: ${{ fromJSON(needs.prepare.outputs.devices_json) }}
    steps:
      - uses: actions/checkout@v4

      - name: Restore SDK artifact
        id: sdk
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: sdk-${{ needs.prepare.outputs.source }}-${{ matrix.device }}
          path: ${{ github.workspace }}/sdk-cache/${{ matrix.device }}/

      - name: Setup source tree and feeds
        id: setup
        uses: ./.github/actions/setup-feeds
        with:
          source: ${{ needs.prepare.outputs.source }}
          device: ${{ matrix.device }}
          feeds_mode: append
          repo_root: ${{ github.workspace }}

      - name: Extract SDK (if available)
        id: extract
        shell: bash
        run: |
          CACHE="${{ github.workspace }}/sdk-cache/${{ matrix.device }}"
          SDK_DIR="${{ github.workspace }}/build/sdk-${{ matrix.device }}"
          mkdir -p "$SDK_DIR"
          shopt -s nullglob
          archives=("$CACHE"/*.tar.xz)
          if [[ ${#archives[@]} -gt 0 ]]; then
            tar -xJf "${archives[0]}" -C "$SDK_DIR"
            ROOT="$(find "$SDK_DIR" -mindepth 1 -maxdepth 1 -type d | head -1)"
            echo "use_sdk=true" >> "$GITHUB_OUTPUT"
            echo "tree=$ROOT" >> "$GITHUB_OUTPUT"
            echo "Using SDK: $ROOT"
          else
            echo "use_sdk=false" >> "$GITHUB_OUTPUT"
            echo "tree=${{ steps.setup.outputs.source_tree }}" >> "$GITHUB_OUTPUT"
            echo "No SDK artifact — compiling in full source tree"
          fi

      - name: Determine make parallelism
        id: jobs
        shell: bash
        run: |
          N="$(nproc)"
          J=$(( N > 1 ? N - 1 : 1 ))
          [[ $J -gt 8 ]] && J=8
          echo "jobs=$J" >> "$GITHUB_OUTPUT"

      - name: Build packages
        shell: bash
        env:
          PACKAGES_JSON: ${{ needs.prepare.outputs.packages_json }}
        run: |
          TREE="${{ steps.extract.outputs.tree }}"
          JOBS="${{ steps.jobs.outputs.jobs }}"
          mapfile -t packages < <(python3 -c "import json,os; print('\n'.join(json.loads(os.environ['PACKAGES_JSON'])))")
          bash scripts/build-packages.sh "$TREE" "$JOBS" "${packages[@]}"

      - name: Collect IPK artifacts
        id: collect
        shell: bash
        run: |
          OUT="${{ github.workspace }}/artifacts/ipk-${{ needs.prepare.outputs.source }}-${{ matrix.device }}-${{ github.run_id }}"
          eval "$(bash scripts/collect-ipks.sh "${{ steps.extract.outputs.tree }}" "$OUT")"
          echo "count=$count" >> "$GITHUB_OUTPUT"
          echo "dir=$dir" >> "$GITHUB_OUTPUT"

      - name: Upload IPK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ipk-${{ needs.prepare.outputs.source }}-${{ matrix.device }}-${{ github.run_id }}
          path: ${{ steps.collect.outputs.dir }}/*
          if-no-files-found: warn

  summary:
    name: SDK build summary
    needs: [prepare, sdk-build]
    if: always()
    runs-on: ubuntu-22.04
    steps:
      - name: Write summary
        shell: bash
        run: |
          echo "## SDK Build Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Source | ${{ needs.prepare.outputs.source }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Devices | ${{ needs.prepare.outputs.devices_json }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Packages | ${{ needs.prepare.outputs.packages_json }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Result | ${{ needs.sdk-build.result }} |" >> "$GITHUB_STEP_SUMMARY"
